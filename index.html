<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍋 LEMON CATCHER — ARCADE</title>
    <link rel="stylesheet" href="limones.css">
    <script src="utils.js"></script>
</head>
<body onload="iniciar()">

    <div class="contenedor">

        <header class="encabezado">
            <div class="banner-imagen">
                <img
                    src="LIMON.png"
                    alt="Limón pixel art"
                    class="img-banner"
                >
            </div>
            <h1>🍋 ATRAPAR LIMONES</h1>
            <p>&gt;&gt; SI DEL CIELO TE CAEN LIMONS...</p>
            <h2>BY: JOSE LOPEZ</h2>
        </header>

        <div class="zona-juego">
            <canvas id="areaJuego" width="600" height="400"></canvas>
        </div>

        <div class="panel">
            <div class="card-info">
                <p>SCORE</p>
                <span id="txtPuntaje">0</span>
            </div>
            <div class="card-info">
                <p>LIVES</p>
                <span id="txtVidas">3</span>
            </div>
        </div>

        <div class="botones">
            <button onclick="moverIzquierda()">◀ LEFT</button>
            <button onclick="moverDerecha()">RIGHT ▶</button>
            <button onclick="reiniciar()">↺ RESET</button>
        </div>

        <p class="insert-coin">▶▶ INSERT COIN TO PLAY ◀◀</p>

    </div>

    <script src="limones.js"></script>

</body>
</html>
